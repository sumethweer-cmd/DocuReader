<!DOCTYPE html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>DocuReader AI - Automate Document Extraction</title>
    
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#4F46E5",
                        "primary-container": "#EEF2FF",
                        "on-primary": "#FFFFFF",
                        "on-primary-container": "#312E81",
                        "secondary": "#6366F1",
                        "secondary-container": "#F5F3FF",
                        "background": "#FFFFFF",
                        "surface": "#FFFFFF",
                        "surface-variant": "#F8FAFC",
                        "on-background": "#0F172A",
                        "on-surface": "#1E293B",
                        "on-surface-variant": "#475569",
                        "outline": "#E2E8F0",
                        "outline-variant": "#CBD5E1",
                        "error": "#EF4444"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.5rem",
                        "lg": "0.75rem",
                        "xl": "1rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-effect {
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.7);
        }
        .hero-gradient {
            background: radial-gradient(circle at 50% 50%, rgba(79, 70, 229, 0.05) 0%, rgba(255, 255, 255, 0) 70%);
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
  </head>
  <body class="bg-background text-on-background font-body selection:bg-primary/20">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
